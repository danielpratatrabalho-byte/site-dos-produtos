<html lang="pt-BR">

<meta charset="UTF-8">

<style>
body{
font-family: Arial, sans-serif;
font-size:1.25rem !important;
background:#f8f9fa;
padding:20px;
}

.toolbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:10px;
}

.leftControls{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.rightControls{
display:flex;
gap:8px;
align-items:center;
}

.product{
display:flex;
justify-content:space-between;
align-items:center;
background:#6c757d;
padding:12px 15px;
margin-bottom:10px;
border-radius:6px;
border-bottom:solid #fd7e14 3px;
color:white;
}

.product.done{
background:#4f5b66;
text-decoration:line-through;
color:#d4ffd9;
}

button,.mark-btn,.delete-btn{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
margin-left:5px;
font-weight:bold;
}

button{
background:#fd7e14;
color:white;
}

.mark-btn{
background:#fd7e14;
color:white;
}

.mark-btn.done{
background:#28a745;
}

.delete-btn{
background:#fd7e14;
color:white;
}

.statsBox{
background:#6c757d;
color:white;
padding:6px 12px;
border-radius:6px;
border-bottom:solid #fd7e14 3px;
}

input{
padding:6px;
width:220px;
border:1px solid #ccc;
border-radius:4px;
}

.switch{display:flex;align-items:center;gap:8px;margin-left:10px;}
.switch input{display:none;}
.toggle{width:50px;height:26px;background:#ccc;border-radius:30px;position:relative;cursor:pointer;transition:0.3s;}
.toggle::before{content:"";position:absolute;width:22px;height:22px;background:white;border-radius:50%;top:2px;left:2px;transition:0.3s;}
.switch input:checked + .toggle{background:#fd7e14;}
.switch input:checked + .toggle::before{transform:translateX(24px);}

.switch input{
transform:scale(1.2);
cursor:pointer;
}
</style>
</head>

<button id="addBtn">Adicionar</button>

<label class="switch">
<input type="checkbox" id="autoMarkToggle">
<div class="toggle"></div>
</label>

</div>

<div class="rightControls">
<button id="undoBtn">⬅</button>
<button id="redoBtn">➡</button>
<button id="clearAllBtn">Apagar tudo</button>

let products = JSON.parse(localStorage.getItem('products'));
if (!products || products.length === 0) {
  products = defaultProducts;
}

let autoMark = JSON.parse(localStorage.getItem('autoMark')) || false;
let history=[];
let redoHistory=[];

const productList=document.getElementById('productList');
const toggle=document.getElementById('autoMarkToggle');

toggle.checked = autoMark;

toggle.addEventListener('change',()=>{
autoMark = toggle.checked;
localStorage.setItem('autoMark',JSON.stringify(autoMark));
});

function saveState(){
history.push(JSON.stringify(products));
if(history.length>50)history.shift();
redoHistory=[];
}

function saveProducts(){
localStorage.setItem('products',JSON.stringify(products));
}

function updateStats(){
const done=products.filter(p=>p.done).length;
const total=products.length;
document.getElementById('statsBox').textContent=`Produtos feitos: ${done}/${total}`;
}

function renderProducts(){
productList.innerHTML='';

products.forEach((item,index)=>{

const div=document.createElement('div');
div.className='product';
if(item.done)div.classList.add('done');

const span=document.createElement('span');
span.textContent=item.code;

const copyBtn=document.createElement('button');
copyBtn.textContent='Copiar';

copyBtn.onclick=()=>{
saveState();
navigator.clipboard.writeText(item.code);

if(autoMark){
item.done=true;
}

saveProducts();
renderProducts();
};

const markBtn=document.createElement('button');
markBtn.className='mark-btn';
markBtn.textContent=item.done?'✓':'X';

markBtn.onclick=()=>{
saveState();
item.done=!item.done;
saveProducts();
renderProducts();
};

const deleteBtn=document.createElement('button');
deleteBtn.className='delete-btn';
deleteBtn.textContent='X';

deleteBtn.onclick=()=>{
if(confirm(`Remover produto ${item.code}?`)){
saveState();
products.splice(index,1);
saveProducts();
renderProducts();
}
};


div.appendChild(span);
div.appendChild(copyBtn);
div.appendChild(markBtn);
div.appendChild(deleteBtn);

productList.appendChild(div);

});

updateStats();
}

// adicionar produto

document.getElementById('addBtn').onclick=()=>{
const val=document.getElementById('newProduct').value.trim();

if(val){
saveState();
products.push({code:val,done:false});
saveProducts();
renderProducts();
document.getElementById('newProduct').value='';
}
};

// apagar tudo

document.getElementById('clearAllBtn').onclick=()=>{
if(confirm('Tem certeza que deseja apagar TODOS os produtos?')){
if(confirm('Confirma novamente apagar tudo?')){
saveState();
products=[];
saveProducts();
renderProducts();
}
}
};

// undo

document.getElementById('undoBtn').onclick=()=>{
if(history.length>0){
redoHistory.push(JSON.stringify(products));
products=JSON.parse(history.pop());
saveProducts();
renderProducts();
}
};

// redo

document.getElementById('redoBtn').onclick=()=>{
if(redoHistory.length>0){
history.push(JSON.stringify(products));
products=JSON.parse(redoHistory.pop());
saveProducts();
renderProducts();
}
};

// ENTER para adicionar

document.getElementById('newProduct').addEventListener('keypress',function(e){
if(e.key==='Enter'){
document.getElementById('addBtn').click();
}
});

renderProducts();
